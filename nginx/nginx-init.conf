# Initial config — HTTP only, used for first-time Certbot certificate generation
# Once certs are obtained, docker-compose switches to nginx.conf automatically

server {
    listen 80;
    server_name bypass.skillxen.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
